name: Keep App Alive

# Visits the live app every 6 hours so it never sits idle long enough to
# trigger Streamlit Community Cloud's 12-hour sleep or Supabase's 7-day
# inactivity pause. Also runnable manually from the Actions tab.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit the app (wakes it up if asleep, keeps it awake if not)
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: python .github/workflows/keep_alive.py
